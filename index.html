<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Tracker — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #3551FF;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 14px;
            color: #8b949e;
            margin-bottom: 36px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #8b949e;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #e6edf3;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #3551FF;
        }
        .btn-login {
            width: 100%;
            padding: 11px 0;
            background: #3551FF;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #2a44dd;
        }
        .error-msg {
            color: #f85149;
            font-size: 13px;
            margin-top: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">Content Tracker</div>
        <div class="subtitle">Amazon Listing-Monitoring</div>
        <form id="loginForm">
            <div class="form-group">
                <label for="password">Passwort</label>
                <input type="password" id="password" placeholder="Passwort eingeben" autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login">Anmelden</button>
            <div class="error-msg" id="errorMsg">Falsches Passwort.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var pw = document.getElementById('password').value;
            if (pw === 'adsmasters2026') {
                sessionStorage.setItem('ct_auth', 'true');
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
