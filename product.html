<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produkt – Content Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f6f8fa; --bg-hover: #eef1f5;
            --border: #d0d7de; --text-primary: #1f2328; --text-secondary: #656d76;
            --accent: #3551FF; --accent-hover: #2a41cc;
            --error: #cf222e; --success: #1a7f37; --success-bg: #dafbe1;
            --badge-bg: #e8e8e8; --row-border: #e8eaed;
            --status-active-bg: #dafbe1; --status-active-color: #1a7f37;
            --status-paused-bg: #eef1f5; --status-paused-color: #656d76;
            --modal-overlay: rgba(0,0,0,0.3);
            --diff-del-bg: #ffebe9; --diff-add-bg: #dafbe1;
            --diff-del-color: #cf222e; --diff-add-color: #1a7f37;
            --diff-del-border: #ffcecb; --diff-add-border: #aceebb;
        }
        [data-theme="dark"] {
            --bg-primary: #0d1117; --bg-secondary: #161b22; --bg-hover: #1c2129;
            --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
            --accent: #3551FF; --accent-hover: #2a44dd;
            --error: #f85149; --success: #3fb950; --success-bg: #0d3320;
            --badge-bg: #30363d; --row-border: #21262d;
            --status-active-bg: #0d3320; --status-active-color: #3fb950;
            --status-paused-bg: #272c33; --status-paused-color: #8b949e;
            --modal-overlay: rgba(0,0,0,0.6);
            --diff-del-bg: #3d1f1f; --diff-add-bg: #1f3d1f;
            --diff-del-color: #f85149; --diff-add-color: #3fb950;
            --diff-del-border: #3d1f1f; --diff-add-border: #1f3d1f;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.2s, color 0.2s;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Top bar */
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .topbar-left { display: flex; align-items: center; gap: 32px; }
        .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
        .nav { display: flex; gap: 24px; }
        .nav a {
            color: var(--text-secondary);
            font-size: 14px;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            transition: color .15s;
        }
        .nav a:hover { color: var(--text-primary); text-decoration: none; }
        .nav a.active { color: var(--text-primary); border-bottom-color: var(--accent); }
        .btn-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }
        .btn-logout:hover { border-color: var(--text-secondary); color: var(--text-primary); }

        /* Main content */
        .main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }

        /* Back link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 20px;
            transition: color .15s;
        }
        .back-link:hover { color: var(--text-primary); text-decoration: none; }

        /* Product header */
        .product-header {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 24px;
            display: flex;
            gap: 24px;
            margin-bottom: 32px;
        }
        .product-image {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--row-border);
        }
        .product-image-placeholder {
            width: 100px;
            height: 100px;
            border-radius: 8px;
            background: var(--row-border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 32px;
        }
        .product-info { flex: 1; min-width: 0; }
        .product-asin {
            font-family: monospace;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }
        .product-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .3px;
        }
        .badge-marketplace {
            background: rgba(53, 81, 255, .15);
            color: var(--accent);
        }
        .badge-active {
            background: var(--status-active-bg);
            color: var(--status-active-color);
        }
        .badge-paused {
            background: rgba(234, 179, 8, .15);
            color: #eab308;
        }
        .product-scan {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }
        .btn-scan {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s;
        }
        .btn-scan:hover { background: #4a63ff; }

        /* Timeline */
        .timeline { position: relative; padding-left: 28px; }
        .timeline::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 6px;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .timeline-entry {
            position: relative;
            margin-bottom: 24px;
        }
        .timeline-dot {
            position: absolute;
            left: -28px;
            top: 18px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-primary);
            z-index: 1;
        }
        .timeline-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px 20px;
        }
        .timeline-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .field-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .field-titel { background: rgba(53, 81, 255, .15); color: var(--accent); }
        .field-bullets { background: rgba(63, 185, 80, .15); color: var(--success); }
        .field-bilder { background: rgba(234, 179, 8, .15); color: #eab308; }
        .field-aplus { background: rgba(168, 85, 247, .15); color: #a855f7; }
        .timeline-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* Diff: Title */
        .diff-inline { font-size: 14px; line-height: 1.7; }
        .diff-del {
            background: var(--diff-del-bg);
            color: var(--diff-del-color);
            text-decoration: line-through;
            padding: 1px 3px;
            border-radius: 3px;
        }
        .diff-add {
            background: var(--diff-add-bg);
            color: var(--diff-add-color);
            padding: 1px 3px;
            border-radius: 3px;
        }

        /* Diff: Bullets */
        .diff-bullets { font-size: 14px; line-height: 1.8; }
        .diff-bullet-line { display: flex; gap: 8px; align-items: flex-start; }
        .diff-bullet-prefix {
            flex-shrink: 0;
            font-weight: 700;
            width: 18px;
            text-align: center;
        }
        .diff-bullet-removed .diff-bullet-prefix { color: var(--error); }
        .diff-bullet-added .diff-bullet-prefix { color: var(--success); }
        .diff-bullet-modified .diff-bullet-prefix { color: #eab308; }
        .diff-bullet-removed { color: var(--error); }
        .diff-bullet-added { color: var(--success); }
        .diff-bullet-modified { color: var(--text-primary); }

        /* Diff: Images */
        .diff-images-section { margin-bottom: 10px; }
        .diff-images-label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .diff-images-label-removed { color: var(--error); }
        .diff-images-label-added { color: var(--success); }
        .diff-images-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .diff-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid;
        }
        .diff-img-removed { border-color: var(--error); }
        .diff-img-added { border-color: var(--success); }

        /* Diff: A+ Content */
        .aplus-toggle {
            background: var(--bg-hover);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            margin-top: 8px;
            transition: background .15s;
        }
        .aplus-toggle:hover { background: var(--border); }
        .aplus-detail { display: none; margin-top: 14px; }
        .aplus-detail.open { display: flex; gap: 16px; flex-wrap: wrap; }
        .aplus-panel { flex: 1; min-width: 280px; }
        .aplus-panel-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 10px;
            border-radius: 6px 6px 0 0;
        }
        .aplus-panel-label-old { background: var(--diff-del-bg); color: var(--error); }
        .aplus-panel-label-new { background: var(--diff-add-bg); color: var(--success); }
        .aplus-panel pre {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 6px 6px;
            padding: 12px;
            font-size: 12px;
            color: var(--text-secondary);
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 300px;
            overflow-y: auto;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .product-header { flex-direction: column; align-items: flex-start; }
            .aplus-detail.open { flex-direction: column; }
            .aplus-panel { min-width: 0; }
        }
    </style>
</head>
<body>

    <script>
        const savedTheme = localStorage.getItem('ct_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('ct_theme', next);
            document.documentElement.setAttribute('data-theme', next);
            document.getElementById('themeToggle').innerHTML = next === 'dark' ? '&#9788;' : '&#9790;';
        }
    </script>

    <!-- Top bar -->
    <header class="topbar">
        <div class="topbar-left">
            <span class="logo">Content Tracker</span>
            <nav class="nav">
                <a href="dashboard.html">Dashboard</a>
                <a href="clients.html">Produkte</a>
                <a href="help.html">Hilfe</a>
            </nav>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
            <button id="themeToggle" onclick="toggleTheme()" style="background:transparent;border:1px solid var(--border);color:var(--text-secondary);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:16px;line-height:1;">&#9790;</button>
            <button class="btn-logout" onclick="sessionStorage.removeItem('ct_auth'); location.href='index.html';">Logout</button>
        </div>
    </header>

    <script>
        document.getElementById('themeToggle').innerHTML = (localStorage.getItem('ct_theme') || 'light') === 'dark' ? '&#9788;' : '&#9790;';
    </script>

    <div class="main">
        <a href="javascript:history.back()" class="back-link">&larr; Zur&uuml;ck</a>

        <!-- Product header card -->
        <div class="product-header" id="productHeader">
            <div class="loading">Produkt wird geladen&hellip;</div>
        </div>

        <!-- Current snapshot -->
        <div id="currentSnapshot" style="display:none;"></div>

        <!-- Change timeline -->
        <div id="timeline">
            <div class="loading">Änderungen werden geladen&hellip;</div>
        </div>
    </div>

    <script>
        // Auth check
        if (!sessionStorage.getItem('ct_auth')) {
            location.href = 'index.html';
        }

        // Supabase init
        const sb = supabase.createClient(
            'https://lgrnmiszhhahfcmctmwo.supabase.co',
            'sb_publishable_E5tO2TvBrU8f1s5djnVOOQ_vk1djyAI'
        );

        // Get product ID from URL
        const params = new URLSearchParams(location.search);
        const productId = params.get('id');
        if (!productId) {
            location.href = 'dashboard.html';
        }

        // --- Diff helpers ---

        function diffWords(oldText, newText) {
            if (!oldText && !newText) return '';
            if (!oldText) return '<span class="diff-add">' + esc(newText) + '</span>';
            if (!newText) return '<span class="diff-del">' + esc(oldText) + '</span>';

            const oldWords = oldText.split(/\s+/);
            const newWords = newText.split(/\s+/);
            const result = [];

            // Simple LCS-based word diff
            const lcs = buildLCS(oldWords, newWords);
            let oi = 0, ni = 0, li = 0;

            while (oi < oldWords.length || ni < newWords.length) {
                if (li < lcs.length && oi < oldWords.length && ni < newWords.length && oldWords[oi] === lcs[li] && newWords[ni] === lcs[li]) {
                    result.push(esc(lcs[li]));
                    oi++; ni++; li++;
                } else if (li < lcs.length && ni < newWords.length && newWords[ni] === lcs[li]) {
                    // Old word removed
                    result.push('<span class="diff-del">' + esc(oldWords[oi]) + '</span>');
                    oi++;
                } else if (li < lcs.length && oi < oldWords.length && oldWords[oi] === lcs[li]) {
                    // New word added
                    result.push('<span class="diff-add">' + esc(newWords[ni]) + '</span>');
                    ni++;
                } else {
                    // Neither matches LCS next
                    if (oi < oldWords.length && (li >= lcs.length || oldWords[oi] !== lcs[li])) {
                        result.push('<span class="diff-del">' + esc(oldWords[oi]) + '</span>');
                        oi++;
                    }
                    if (ni < newWords.length && (li >= lcs.length || newWords[ni] !== lcs[li])) {
                        result.push('<span class="diff-add">' + esc(newWords[ni]) + '</span>');
                        ni++;
                    }
                }
            }

            return result.join(' ');
        }

        function buildLCS(a, b) {
            const m = a.length, n = b.length;
            const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
                }
            }
            const result = [];
            let i = m, j = n;
            while (i > 0 && j > 0) {
                if (a[i - 1] === b[j - 1]) { result.unshift(a[i - 1]); i--; j--; }
                else if (dp[i - 1][j] > dp[i][j - 1]) { i--; }
                else { j--; }
            }
            return result;
        }

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str || '';
            return d.innerHTML;
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            const hh = String(d.getHours()).padStart(2, '0');
            const min = String(d.getMinutes()).padStart(2, '0');
            return dd + '.' + mm + '.' + yyyy + ', ' + hh + ':' + min + ' Uhr';
        }

        function fieldLabel(field) {
            const map = { title: 'Titel', bullets: 'Bullet Points', images: 'Bilder', a_plus: 'A+ Content', aplus: 'A+ Content' };
            return map[field] || field;
        }

        function fieldClass(field) {
            const map = { title: 'field-titel', bullets: 'field-bullets', images: 'field-bilder', a_plus: 'field-aplus', aplus: 'field-aplus' };
            return map[field] || 'field-titel';
        }

        function dotColor(field) {
            const map = { title: 'var(--accent)', bullets: 'var(--success)', images: '#eab308', aplus: '#a855f7' };
            return map[field] || 'var(--accent)';
        }

        // --- Render diff based on type ---

        function renderDiff(change) {
            const field = change.field;
            const oldVal = change.old_value;
            const newVal = change.new_value;

            if (field === 'title') {
                return renderBeforeAfter('Titel', oldVal || '', newVal || '');
            }

            if (field === 'bullets') {
                return renderBulletsDiff(oldVal, newVal);
            }

            if (field === 'images') {
                return renderImagesDiff(oldVal, newVal);
            }

            if (field === 'a_plus' || field === 'aplus') {
                return renderAplusDiff(oldVal, newVal, change.id);
            }

            // Fallback: simple word diff
            return '<div class="diff-inline">' + diffWords(oldVal || '', newVal || '') + '</div>';
        }

        function renderBeforeAfter(label, oldText, newText) {
            let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
            html += '<div style="background:var(--diff-del-bg);border:1px solid var(--diff-del-border);border-radius:6px;padding:12px;">';
            html += '<div style="font-size:11px;color:var(--error);font-weight:600;margin-bottom:6px;">VORHER</div>';
            html += '<div style="font-size:13px;color:var(--text-primary);line-height:1.5;">' + esc(oldText) + '</div>';
            html += '</div>';
            html += '<div style="background:var(--diff-add-bg);border:1px solid var(--diff-add-border);border-radius:6px;padding:12px;">';
            html += '<div style="font-size:11px;color:var(--success);font-weight:600;margin-bottom:6px;">NACHHER</div>';
            html += '<div style="font-size:13px;color:var(--text-primary);line-height:1.5;">' + esc(newText) + '</div>';
            html += '</div></div>';
            return html;
        }

        function renderBulletsDiff(oldVal, newVal) {
            let oldBullets = [], newBullets = [];
            try { oldBullets = JSON.parse(oldVal) || []; } catch (e) {}
            try { newBullets = JSON.parse(newVal) || []; } catch (e) {}

            let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';

            // Vorher
            html += '<div style="background:var(--diff-del-bg);border:1px solid var(--diff-del-border);border-radius:6px;padding:12px;">';
            html += '<div style="font-size:11px;color:var(--error);font-weight:600;margin-bottom:8px;">VORHER (' + oldBullets.length + ' Bullets)</div>';
            oldBullets.forEach(function(b, i) {
                html += '<div style="font-size:12px;color:var(--text-primary);padding:4px 0;border-bottom:1px solid var(--diff-del-border);line-height:1.4;">' + (i+1) + '. ' + esc(b) + '</div>';
            });
            html += '</div>';

            // Nachher
            html += '<div style="background:var(--diff-add-bg);border:1px solid var(--diff-add-border);border-radius:6px;padding:12px;">';
            html += '<div style="font-size:11px;color:var(--success);font-weight:600;margin-bottom:8px;">NACHHER (' + newBullets.length + ' Bullets)</div>';
            newBullets.forEach(function(b, i) {
                html += '<div style="font-size:12px;color:var(--text-primary);padding:4px 0;border-bottom:1px solid var(--diff-add-border);line-height:1.4;">' + (i+1) + '. ' + esc(b) + '</div>';
            });
            html += '</div></div>';

            return html;
        }

        function renderImagesDiff(oldVal, newVal) {
            let oldImgs = [], newImgs = [];
            try { oldImgs = JSON.parse(oldVal) || []; } catch (e) {}
            try { newImgs = JSON.parse(newVal) || []; } catch (e) {}

            // Normalize URLs for comparison (strip params)
            function normUrl(u) { return u.split("?")[0]; }
            const oldNorm = oldImgs.map(normUrl);
            const newNorm = newImgs.map(normUrl);

            const removed = oldImgs.filter((u, i) => !newNorm.includes(normUrl(u)));
            const added = newImgs.filter((u, i) => !oldNorm.includes(normUrl(u)));
            const reordered = removed.length === 0 && added.length === 0 && oldNorm.join() !== newNorm.join();

            let html = '<div style="display:flex;flex-direction:column;gap:12px;">';

            // Show before/after side by side
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
            html += '<div><div style="font-size:11px;color:var(--error);font-weight:600;margin-bottom:6px;">VORHER (' + oldImgs.length + ' Bilder)</div><div style="display:flex;gap:4px;flex-wrap:wrap;">';
            oldImgs.forEach((u, i) => {
                const isRemoved = !newNorm.includes(normUrl(u));
                const border = isRemoved ? '2px solid var(--error)' : '1px solid var(--border)';
                html += '<div style="position:relative;"><img src="' + esc(u) + '" style="width:60px;height:60px;object-fit:cover;border-radius:4px;border:' + border + ';"><div style="position:absolute;bottom:2px;right:2px;background:var(--bg-primary);color:var(--text-secondary);font-size:9px;padding:1px 4px;border-radius:2px;">' + (i+1) + '</div></div>';
            });
            html += '</div></div>';

            html += '<div><div style="font-size:11px;color:var(--success);font-weight:600;margin-bottom:6px;">NACHHER (' + newImgs.length + ' Bilder)</div><div style="display:flex;gap:4px;flex-wrap:wrap;">';
            newImgs.forEach((u, i) => {
                const isAdded = !oldNorm.includes(normUrl(u));
                const border = isAdded ? '2px solid var(--success)' : '1px solid var(--border)';
                html += '<div style="position:relative;"><img src="' + esc(u) + '" style="width:60px;height:60px;object-fit:cover;border-radius:4px;border:' + border + ';"><div style="position:absolute;bottom:2px;right:2px;background:var(--bg-primary);color:var(--text-secondary);font-size:9px;padding:1px 4px;border-radius:2px;">' + (i+1) + '</div></div>';
            });
            html += '</div></div></div>';

            if (reordered) html += '<div style="font-size:12px;color:#eab308;">↔ Bildreihenfolge wurde geändert</div>';
            html += '</div>';
            return html;
        }

        function renderAplusDiff(oldVal, newVal, id) {
            let oldImgs = [], newImgs = [];
            try { oldImgs = JSON.parse(oldVal) || []; } catch (e) {}
            try { newImgs = JSON.parse(newVal) || []; } catch (e) {}
            if (typeof oldImgs === 'string') try { oldImgs = JSON.parse(oldImgs); } catch (e) {}
            if (typeof newImgs === 'string') try { newImgs = JSON.parse(newImgs); } catch (e) {}

            function normUrl(u) { return String(u).split("?")[0]; }
            const oldNorm = (oldImgs || []).map(normUrl);
            const newNorm = (newImgs || []).map(normUrl);

            let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">';
            html += '<div><div style="font-size:11px;color:var(--error);font-weight:600;margin-bottom:6px;">VORHER (' + oldNorm.length + ' A+ Bilder)</div><div style="display:flex;gap:4px;flex-wrap:wrap;">';
            (oldImgs || []).forEach(u => {
                const gone = !newNorm.includes(normUrl(u));
                html += '<img src="' + esc(u) + '" style="width:80px;height:50px;object-fit:cover;border-radius:4px;border:' + (gone ? '2px solid var(--error)' : '1px solid var(--border)') + ';">';
            });
            html += '</div></div>';
            html += '<div><div style="font-size:11px;color:var(--success);font-weight:600;margin-bottom:6px;">NACHHER (' + newNorm.length + ' A+ Bilder)</div><div style="display:flex;gap:4px;flex-wrap:wrap;">';
            (newImgs || []).forEach(u => {
                const isNew = !oldNorm.includes(normUrl(u));
                html += '<img src="' + esc(u) + '" style="width:80px;height:50px;object-fit:cover;border-radius:4px;border:' + (isNew ? '2px solid var(--success)' : '1px solid var(--border)') + ';">';
            });
            html += '</div></div></div>';
            return html;
        }

        function toggleAplus(id, btn) {
            const el = document.getElementById(id);
            if (el.classList.contains('open')) {
                el.classList.remove('open');
                btn.textContent = 'Details anzeigen';
            } else {
                el.classList.add('open');
                btn.textContent = 'Details ausblenden';
            }
        }

        // --- Load data ---

        async function loadProduct() {
            const { data: product, error } = await sb
                .from('ct_products')
                .select('*, ct_clients(name, marketplace)')
                .eq('id', productId)
                .single();

            if (error || !product) {
                document.getElementById('productHeader').innerHTML = '<div class="empty-state">Produkt nicht gefunden.</div>';
                return null;
            }

            const clientName = product.ct_clients ? product.ct_clients.name : '—';
            product.marketplace = product.ct_clients ? product.ct_clients.marketplace : 'DE';
            const statusClass = product.status === 'active' ? 'badge-active' : 'badge-paused';
            const statusLabel = product.status === 'active' ? 'Aktiv' : 'Pausiert';
            const lastScan = product.last_scanned_at ? formatDate(product.last_scanned_at) : '—';

            let imageHtml;
            if (product.image_url) {
                imageHtml = '<img src="' + esc(product.image_url) + '" class="product-image" alt="Produktbild">';
            } else {
                imageHtml = '<div class="product-image-placeholder">&#128230;</div>';
            }

            document.getElementById('productHeader').innerHTML =
                imageHtml +
                '<div class="product-info">' +
                    '<div class="product-asin">' + esc(product.asin || '') + '</div>' +
                    '<div class="product-title">' + esc(product.title || 'Kein Titel') + '</div>' +
                    '<div class="product-meta">' +
                        '<span>' + esc(clientName) + '</span>' +
                        '<span class="badge badge-marketplace">' + esc(product.marketplace || '') + '</span>' +
                        '<span class="badge ' + statusClass + '">' + statusLabel + '</span>' +
                    '</div>' +
                    '<div class="product-scan">Letzter Scan: ' + lastScan + '</div>' +
                    '<button class="btn-scan" id="btnScanProduct">Jetzt scannen</button>' +
                    '<a href="https://www.amazon.' + (product.marketplace === 'US' ? 'com' : product.marketplace === 'UK' ? 'co.uk' : (product.marketplace || 'de').toLowerCase()) + '/dp/' + esc(product.asin) + '" target="_blank" rel="noopener" style="display:inline-block;padding:8px 16px;background:var(--bg-hover);border:1px solid var(--border);border-radius:6px;color:var(--text-primary);font-size:13px;font-weight:600;text-decoration:none;">Auf Amazon ansehen ↗</a>' +
                '</div>';

            document.title = (product.asin || 'Produkt') + ' – Content Tracker';
            return product;
        }

        async function loadChanges() {
            const { data: changes, error } = await sb
                .from('ct_changes')
                .select('*')
                .eq('product_id', productId)
                .order('detected_at', { ascending: false });

            const container = document.getElementById('timeline');

            if (error) {
                container.innerHTML = '<div class="empty-state">Fehler beim Laden der Änderungen.</div>';
                return;
            }

            if (!changes || changes.length === 0) {
                container.innerHTML = '<div class="empty-state">Keine Änderungen für dieses Produkt erkannt.</div>';
                return;
            }

            let html = '<div class="timeline">';
            changes.forEach(change => {
                const color = dotColor(change.field);
                html += '<div class="timeline-entry">';
                html += '<div class="timeline-dot" style="background:' + color + ';"></div>';
                html += '<div class="timeline-card">';
                html += '<div class="timeline-card-header">';
                html += '<span class="field-badge ' + fieldClass(change.field) + '">' + fieldLabel(change.field) + '</span>';
                html += '<span class="timeline-date">' + formatDate(change.detected_at) + '</span>';
                html += '</div>';
                html += renderDiff(change);
                html += '</div></div>';
            });
            html += '</div>';

            container.innerHTML = html;
        }

        async function loadCurrentSnapshot() {
            const { data: snaps } = await sb
                .from('ct_snapshots')
                .select('*')
                .eq('product_id', productId)
                .order('fetched_at', { ascending: false })
                .limit(1);

            const container = document.getElementById('currentSnapshot');
            if (!snaps || snaps.length === 0) {
                container.style.display = 'none';
                return;
            }

            const snap = snaps[0];
            container.style.display = '';

            let html = '<div style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:24px;">';
            html += '<h3 style="font-size:16px;font-weight:600;margin-bottom:16px;color:var(--text-primary);">Aktueller Zustand</h3>';

            // Title
            html += '<div style="margin-bottom:16px;">';
            html += '<div style="font-size:11px;text-transform:uppercase;color:var(--text-secondary);letter-spacing:0.5px;margin-bottom:4px;">Titel</div>';
            html += '<div style="font-size:14px;color:var(--text-primary);">' + esc(snap.title || '—') + '</div>';
            html += '</div>';

            // Bullets
            const bullets = snap.bullets || [];
            if (bullets.length > 0) {
                html += '<div style="margin-bottom:16px;">';
                html += '<div style="font-size:11px;text-transform:uppercase;color:var(--text-secondary);letter-spacing:0.5px;margin-bottom:4px;">Bullet Points (' + bullets.length + ')</div>';
                html += '<ul style="list-style:none;padding:0;">';
                bullets.forEach(function(b) {
                    html += '<li style="font-size:13px;color:var(--text-primary);padding:6px 0;border-bottom:1px solid var(--row-border);">• ' + esc(b) + '</li>';
                });
                html += '</ul></div>';
            }

            // Images
            const images = snap.images || [];
            if (images.length > 0) {
                html += '<div style="margin-bottom:16px;">';
                html += '<div style="font-size:11px;text-transform:uppercase;color:var(--text-secondary);letter-spacing:0.5px;margin-bottom:8px;">Bilder (' + images.length + ')</div>';
                html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
                images.forEach(function(url) {
                    html += '<img src="' + esc(url) + '" style="width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--border);">';
                });
                html += '</div></div>';
            }

            // A+ Images
            let aPlusImages = [];
            try { aPlusImages = JSON.parse(snap.a_plus_html || '[]'); } catch(e) {}
            if (aPlusImages.length > 0) {
                html += '<div>';
                html += '<div style="font-size:11px;text-transform:uppercase;color:var(--text-secondary);letter-spacing:0.5px;margin-bottom:8px;">A+ Content Bilder (' + aPlusImages.length + ')</div>';
                html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">';
                aPlusImages.forEach(function(url) {
                    html += '<img src="' + esc(url) + '" style="width:120px;height:80px;object-fit:cover;border-radius:6px;border:1px solid var(--border);">';
                });
                html += '</div></div>';
            }

            html += '<div style="margin-top:12px;font-size:11px;color:var(--text-secondary);">Snapshot vom ' + formatDate(snap.fetched_at) + '</div>';
            html += '</div>';

            container.innerHTML = html;
        }

        // Single product scan via Edge Function
        async function scanProduct() {
            const btn = document.getElementById('btnScanProduct');
            if (!btn) return;
            btn.disabled = true;
            btn.textContent = 'Scan läuft...';

            try {
                // Get client_id for this product
                const { data: product } = await sb.from('ct_products').select('client_id').eq('id', productId).single();
                if (!product) { alert('Produkt nicht gefunden.'); return; }

                const SUPABASE_URL = sb.supabaseUrl || 'https://lgrnmiszhhahfcmctmwo.supabase.co';
                const response = await fetch(SUPABASE_URL + '/functions/v1/scan-products', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + sb.supabaseKey
                    },
                    body: JSON.stringify({ client_id: product.client_id })
                });

                const result = await response.json();
                alert('Scan abgeschlossen. ' + (result.scanned || 0) + ' ASIN(s) gescannt, ' +
                    (result.changes_found || 0) + ' Änderung(en) erkannt.');
                location.reload();
            } catch (e) {
                alert('Scan fehlgeschlagen: ' + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Jetzt scannen';
            }
        }

        // Init
        Promise.all([loadProduct(), loadChanges(), loadCurrentSnapshot()]).then(() => {
            const btn = document.getElementById('btnScanProduct');
            if (btn) btn.addEventListener('click', scanProduct);
        });
    </script>
</body>
</html>
